name: Build and Push Docker Image to GHCR

# Builds a linux/amd64 image and pushes to ghcr.io/<repo>. Apple Silicon
# users run it via Docker Desktop's Rosetta layer, which is fast enough that
# the multi-arch + manifest-merge complexity isn't worth carrying.
#
# Triggered by v* tag pushes or workflow_dispatch (pick a tag as ref in the UI).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # latest=auto only moves the latest tag when the semver being built is
      # the highest in the repo — rebuilding an older tag does not roll
      # latest backwards.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          # ignore-error so a transient cache write does not fail the build.
          cache-to: type=gha,mode=max,ignore-error=true
